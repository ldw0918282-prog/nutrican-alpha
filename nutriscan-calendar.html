<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Calendar - Monthly</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
  }

  .phone {
    width: 375px;
    height: 812px;
    background: #fff;
    overflow: hidden;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

 .header {
  background: #5f9f68;
  color: white;
  padding: 20px 20px 10px;
}

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .date-title {
    font-size: 18px;
    font-weight: bold;
  }

  .nav-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 10px;
    cursor: pointer;
  }

  .calendar {
    margin-top: 15px;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 8px;
  }

  .dates-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .date {
  height:48px;
  border-radius:12px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding-top:10px;
  font-size:14px;
  cursor:pointer;
  position:relative;
  flex-direction:column;
}

  .date.today {
  background: white;
  color: black;
}

  .date.selected {
  background: white;
  border: 1px solid white;
  color: black;
}

  .date.other {
    opacity: 0.3;
  }

.schedule-box{
  height:220px;
  background:white;
  padding:20px;
  overflow-y:auto;
  border-radius:25px 25px 0 0;
  margin-top:10px;
}

.schedule-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:12px;
}

.schedule-item{
  background:#f6f6f6;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  font-size:14px;
  color:black;
  font-weight:500;
}

.dot-green{
  width:8px;
  height:8px;
  background:#9be15d;
  border-radius:50%;
  position:absolute;
  bottom:6px;
}

.dot-red{
  width:8px;
  height:8px;
  background:red;
  border-radius:50%;
  position:absolute;
  bottom:6px;
}

.schedule-guide{
  display:flex;
  gap:16px;
  margin-bottom:15px;
  font-size:12px;
  color:#666;
  align-items:center;
  flex-wrap:wrap;
}

.guide-item{
  display:flex;
  align-items:center;
  gap:6px;
}

.guide-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.guide-dot.green{
  background:#9be15d;
}

.guide-dot.red{
  background:red;
}
</style>
</head>
<body>

<div class="phone">
  <div class="header">

    <div class="top-bar">
  <button class="nav-btn" onclick="goHome()">닫기</button>

  <div class="date-title" id="currentMonth"></div>

  <div style="display:flex; gap:8px;">
    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
  </div>
</div>

    <div class="calendar">
  <div class="weekdays" id="weekdays"></div>
  <div class="dates-grid" id="datesGrid"></div>
</div>

<!-- ✅ 여기 추가 -->
<div class="schedule-box">
  <div class="schedule-title">일정</div>

  <div class="schedule-guide">
    <span class="guide-item">
      <span class="guide-dot green"></span>
      특정 날짜 알람
    </span>

    <span class="guide-item">
      <span class="guide-dot red"></span>
      반복 알람
    </span>
  </div>

  <div id="scheduleList">날짜를 선택하세요.</div>
</div>

<script>
const daysKor = ["일","월","화","수","목","금","토"];

let current = new Date();
let selectedDate = null;

// ✅ 여기 추가
function getAlarms(){
  let user = localStorage.getItem("currentUser");

  if(!user) return [];

  const alarms =
    JSON.parse(
      localStorage.getItem(user + "_alarms")
    ) || [];

  return alarms.filter(a => a.active !== false);
}
function renderCalendar() {
  const year = current.getFullYear();
  const month = current.getMonth();

  document.getElementById("currentMonth").innerText = `${year}.${month + 1}`;

  const weekdaysEl = document.getElementById("weekdays");
  const grid = document.getElementById("datesGrid");

  weekdaysEl.innerHTML = "";
  grid.innerHTML = "";

  // 요일 헤더
  daysKor.forEach(d => {
    const el = document.createElement("div");
    el.innerText = d;
    weekdaysEl.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const prevLastDate = new Date(year, month, 0).getDate();

  const today = new Date();

  // 이전 달 채우기
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement("div");
    el.className = "date other";
    el.innerText = prevLastDate - i;
    grid.appendChild(el);
  }

  // 이번 달
  for (let i = 1; i <= lastDate; i++) {
    const alarms = getAlarms();
const currentDate = new Date(year, month, i);

const dayKor = ["일","월","화","수","목","금","토"][currentDate.getDay()];

const dateString =
  `${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
    const el = document.createElement("div");
    el.className = "date";
    el.innerText = i;

    // 오늘 표시
    if (
      i === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ) {
      el.classList.add("today");
    }

    el.onclick = () => {
  document.querySelectorAll(".date").forEach(d => d.classList.remove("selected"));
  el.classList.add("selected");

  selectedDate = new Date(year, month, i);

  showSchedule(dateString, dayKor);
};

// 특정 날짜 알람 (초록 점)
const dateAlarms = alarms.filter(a => a.date === dateString);

if(dateAlarms.length){
  const dot = document.createElement("div");
  dot.className = "dot-green";
  el.appendChild(dot);
}

// 반복 알람 (빨간 점)
const weeklyAlarms = alarms.filter(a=>{
  if(!a.days) return false;

  let days = a.days;

  if(typeof days === "string"){
    days = days.split(",");
  }

  return days.includes(dayKor);
});

if(weeklyAlarms.length){
  const dot = document.createElement("div");
  dot.className = "dot-red";
  dot.style.bottom = "16px";
  el.appendChild(dot);
}

// ✅ 여기
grid.appendChild(el);
  }

  // 다음 달 채우기 (6줄 유지)
  const totalCells = grid.children.length;
  const nextFill = 42 - totalCells;

  for (let i = 1; i <= nextFill; i++) {
    const el = document.createElement("div");
    el.className = "date other";
    el.innerText = i;
    grid.appendChild(el);
  }
}

function changeMonth(diff) {
  current.setMonth(current.getMonth() + diff);
  renderCalendar();
}

function goHome(){
  location.href = "nutriscan-home.html#home";
}
function showSchedule(dateString, dayKor){
  const alarms = getAlarms();

  const dateSchedules = alarms.filter(
  a => a.date === dateString
);

  const weeklySchedules = alarms.filter(a=>{
  if(!a.days) return false;

  let days = a.days;

  if(typeof days === "string"){
    days = days.split(",");
  }

  return days.includes(dayKor);
});

  const allSchedules = [...dateSchedules, ...weeklySchedules];

  const list = document.getElementById("scheduleList");

  if(allSchedules.length === 0){
    list.innerHTML = "등록된 일정이 없습니다.";
    return;
  }

  list.innerHTML = allSchedules.map(a => {

  // 특정 날짜 알람 → 연두색
  const isDateAlarm = a.date === dateString;

  // 반복 알람 → 빨간색
  const dotColor = isDateAlarm ? "#9be15d" : "red";

  return `
    <div class="schedule-item">
      <div style="
        display:flex;
        align-items:center;
        gap:10px;
        color:black;
      ">
        
        <div style="
          width:12px;
          height:12px;
          border-radius:50%;
          background:${dotColor};
          flex-shrink:0;
        "></div>

        <div>
          ${a.name || a.title || a.productName || "영양제 알람"}
        </div>

      </div>
    </div>
  `;
}).join("");
}
renderCalendar();
</script>

</body>
</html>
